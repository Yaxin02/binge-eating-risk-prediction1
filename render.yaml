services:
  - type: web
    name: binge-prediction-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12

  - type: web
    name: binge-prediction-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Baked into the bundle at build time (override in Render dashboard per project)
      - key: VITE_APPWRITE_ENDPOINT
        value: https://nyc.cloud.appwrite.io/v1
      - key: VITE_APPWRITE_PROJECT_ID
        value: 69d8f483003b02a74713
      - key: VITE_APPWRITE_FUNCTION_ID
        value: predict
      - key: VITE_APPWRITE_DATABASE_ID
        value: binge_db
      - key: VITE_APPWRITE_COLLECTION_ID
        value: patients
