<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="https://github.com/lucide-icons/lucide/raw/refs/heads/main/icons/brain-circuit.svg">
    <style>
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef2ff 0%, #fdf2f8 50%, #ecfeff 100%);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ede9fe;
            color: #5b21b6;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #0f172a;
        }

        p {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            box-sizing: border-box;
        }

        button, .back-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        button {
            color: white;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }

        .back-btn {
            margin-top: 12px;
            color: #0f172a;
            background: white;
            border: 1px solid #d1d5db;
        }

        .error {
            margin-bottom: 14px;
            padding: 12px;
            border-radius: 12px;
            background: #fef2f2;
            color: #b91c1c;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">🛡️ Admin Access</div>
        <h1>Admin Login</h1>
        <p>Enter your admin credentials to access the dashboard.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin-login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <a href="/" class="back-btn">Back to Home</a>
    </div>
</body>
</html>
